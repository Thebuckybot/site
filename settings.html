<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header id="guild-header">
    <div class="guild-info">
      <img id="guild-icon" alt="Guild Icon" />
      <h1 id="guild-name"></h1>
    </div>
    <a href="dashboard.html" class="back-button">← Dashboard</a>
    <a id="soc-link" class="soc-button back-button">SOC Dashboard</a>
  </header>

  <main>
    <section class="card">
      <h2>🔒 Security Settings</h2>
      <div id="anti-mode-toggles">
        </div>
      <div class="punishment-settings">
          <h3>Punishment Settings</h3>
          <div id="punishment-options">
              </div>
      </div>
    </section>

    <section class="card">

      <h2>⚙️ Command Controls</h2>
      <p class="card-subtitle">
        Disable commands or entire modules for this server.
      </p>

      <div class="command-grid">

          <div class="command-column">

              <h3>Commands</h3>

              <div id="disabled-commands" class="toggle-list"></div>

          </div>

          <div class="command-column">

              <h3>Cogs (Modules)</h3>

              <div id="disabled-cogs" class="toggle-list"></div>

          </div>

      </div>

    </section>
    
    <button id="save-settings">💾 Save</button>
  </main>

  <script src="js/settings.js" type="module"></script>
  <script src="js/dashboard.js" type="module"></script>

</body>
</html>
